---

- name: Update apt package cache
  tags: hyprland
  become: true
  apt:
    update_cache: yes

- name: Install hyprland and companion packages
  tags: hyprland
  become: true
  apt:
    name:
      - hyprland
      - hyprland-guiutils
      - hyprlock
      - hyprpaper
      - hypridle
      - hyprpolkitagent
      - hyprshutdown
      - xdg-desktop-portal-hyprland

- name: install wayland and hyprland util packages
  tags: hyprland
  become: true
  apt:
    name:
      - xwayland
      - xdg-desktop-portal
      - xdg-desktop-portal-gtk
      - nwg-look
      - qt6ct
      - dunst
      - playerctl
      - pipewire
      - wireplumber
      - qt6-wayland
      - pavucontrol
      - brightnessctl
      - network-manager-applet
      - system-config-printer
      - wdisplays
      - blueman

---

# TODO: cleanup in the near future

- name: Remove avengemedia danklinux OBS repository
  become: true
  file:
    path: /etc/apt/sources.list.d/home:AvengeMedia:danklinux.list
    state: absent

- name: Remove avengemedia danklinux OBS GPG key
  become: true
  file:
    path: /etc/apt/trusted.gpg.d/home_AvengeMedia_danklinux.gpg
    state: absent

- name: Remove avengemedia danklinux apt pin
  become: true
  file:
    path: /etc/apt/preferences.d/avengemedia-danklinux
    state: absent

- name: Install quickshell
  become: true
  apt:
    name:
      - quickshell
    update_cache: true

- name: Remove quickshell-git package
  become: true
  apt:
    name:
      - quickshell-git
    state: absent

- name: Remove (unofficial) claude-desktop package
  become: true
  apt:
    name: claude-desktop-unofficial
    state: absent

- name: Check for stale (unofficial) Claude Desktop APT repository file
  command: grep -q pkg.claude-desktop-debian.dev /etc/apt/sources.list.d/claude-desktop.list
  register: claude_desktop_unofficial_list
  failed_when: false
  changed_when: false

- name: Remove stale (unofficial) Claude Desktop APT repository file
  become: true
  file:
    path: /etc/apt/sources.list.d/claude-desktop.list
    state: absent
  when: claude_desktop_unofficial_list.rc == 0

- name: Remove (unofficial) Claude Desktop APT repository file
  become: true
  file:
    path: /etc/apt/sources.list.d/claude-desktop-unofficial.list
    state: absent

- name: Remove (unofficial) Claude Desktop APT signing key
  become: true
  file:
    path: /usr/share/keyrings/claude-desktop.gpg
    state: absent

- name: Add Anthropic's Claude Desktop APT signing key
  become: true
  get_url:
    url: https://downloads.claude.ai/claude-desktop/key.asc
    dest: /usr/share/keyrings/claude-desktop-archive-keyring.asc
    mode: '0644'
  retries: 5
  delay: 5

- name: Add Anthropic's Claude Desktop APT repository
  become: true
  shell: |
    echo "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/claude-desktop-archive-keyring.asc] https://downloads.claude.ai/claude-desktop/apt/stable stable main" | tee /etc/apt/sources.list.d/claude-desktop.list

- name: Install claude-desktop
  become: true
  apt:
    name: claude-desktop
    state: present
    update_cache: yes

